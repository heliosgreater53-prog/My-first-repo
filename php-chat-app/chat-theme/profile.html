<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | Simple Chatroom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main class="auth-page">
    <section class="profile-card-page">
      <div class="profile-top">
        <a class="back-link" href="index.html"><i class="bi bi-arrow-left"></i> Back to chat</a>
      </div>

      <div class="profile-box">
        <div class="profile-avatar-large">SO</div>
        <h1>Samuel Okoro</h1>
        <p class="profile-subtitle">Student account</p>
      </div>

      <div class="profile-details">
        <div class="profile-detail">
          <span>Full name</span>
          <strong>Samuel Okoro</strong>
        </div>
        <div class="profile-detail">
          <span>Email</span>
          <strong>samuel@example.com</strong>
        </div>
        <div class="profile-detail">
          <span>Main room</span>
          <strong>General Room</strong>
        </div>
        <div class="profile-detail">
          <span>Status</span>
          <strong>Online</strong>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
