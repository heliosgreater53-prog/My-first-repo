<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Simple Chatroom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <aside class="auth-side">
        <div class="auth-brand">
          <div class="auth-brand-mark">SC</div>
          <div class="auth-brand-text">
            <strong>Chatroom</strong>
            <span>Student space</span>
          </div>
        </div>
        <h1>Welcome back</h1>
        <p>Sign in to continue your conversations and join your rooms.</p>
      </aside>

      <div class="auth-main">
        <h2>Login</h2>
        <p>Enter your details below.</p>

        <form class="auth-form">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@example.com">
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter your password">
          </div>
          <div class="auth-actions">
            <a class="auth-button" href="index.html">Login</a>
            <a class="auth-link" href="signup.html">Create an account</a>
          </div>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
