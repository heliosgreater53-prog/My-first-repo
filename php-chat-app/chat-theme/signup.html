<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup | Simple Chatroom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <aside class="auth-side">
        <div class="auth-brand">
          <div class="auth-brand-mark">SC</div>
          <div class="auth-brand-text">
            <strong>Chatroom</strong>
            <span>Student space</span>
          </div>
        </div>
        <h1>Create account</h1>
        <p>Join the chatroom and start connecting with your group.</p>
      </aside>

      <div class="auth-main">
        <h2>Signup</h2>
        <p>Fill in the form to get started.</p>

        <form class="auth-form">
          <div class="field">
            <label for="name">Full name</label>
            <input id="name" type="text" placeholder="Your full name">
          </div>
          <div class="field">
            <label for="signup-email">Email</label>
            <input id="signup-email" type="email" placeholder="you@example.com">
          </div>
          <div class="field">
            <label for="signup-password">Password</label>
            <input id="signup-password" type="password" placeholder="Create a password">
          </div>
          <div class="auth-actions">
            <a class="auth-button" href="index.html">Create Account</a>
            <a class="auth-link" href="login.html">Already have an account?</a>
          </div>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
