<?xml version="1.0" encoding="UTF-8"?>
<svg width="720" height="540" viewBox="0 0 720 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#14b8a6" />
      <stop offset="1" stop-color="#0d9488" />
    </linearGradient>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-4px); }
      }
      .float { animation: float 3s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Frame -->
  <rect width="720" height="540" rx="20" fill="#0f172a" stroke="rgba(20, 184, 166, 0.1)" stroke-width="1"/>
  
  <!-- Header bar -->
  <rect x="0" y="0" width="720" height="56" rx="20" fill="#1e293b" stroke="rgba(20, 184, 166, 0.1)" stroke-width="1"/>
  <circle cx="28" cy="28" r="14" fill="url(#accentGrad)"/>
  <rect x="52" y="20" width="120" height="8" rx="4" fill="#475569" opacity="0.6"/>
  <rect x="52" y="32" width="100" height="6" rx="3" fill="#475569" opacity="0.4"/>
  <circle cx="680" cy="28" r="12" fill="#64748b" opacity="0.6"/>
  
  <!-- Main content area -->
  <!-- Left sidebar -->
  <rect x="0" y="56" width="180" height="484" fill="#1e293b"/>
  <rect x="12" y="68" width="156" height="28" rx="8" fill="#334155"/>
  <rect x="12" y="104" width="156" height="20" rx="6" fill="#0f172a" opacity="0.5"/>
  <rect x="12" y="130" width="156" height="20" rx="6" fill="#0f172a" opacity="0.3"/>
  <rect x="12" y="156" width="156" height="20" rx="6" fill="#0f172a" opacity="0.3"/>
  
  <!-- Center feed area -->
  <rect x="180" y="56" width="540" height="484" fill="#0f172a"/>
  
  <!-- Messages/Posts -->
  <!-- Post 1 -->
  <g class="float" style="animation-delay: 0s;">
    <rect x="200" y="76" width="500" height="100" rx="12" fill="#1e293b" stroke="rgba(20, 184, 166, 0.08)" stroke-width="1"/>
    <circle cx="220" cy="96" r="16" fill="url(#accentGrad)"/>
    <rect x="248" y="86" width="100" height="8" rx="4" fill="#475569"/>
    <rect x="248" y="100" width="200" height="6" rx="3" fill="#64748b" opacity="0.6"/>
    <rect x="208" y="120" width="280" height="6" rx="3" fill="#64748b" opacity="0.4"/>
    <rect x="208" y="132" width="240" height="6" rx="3" fill="#64748b" opacity="0.4"/>
  </g>
  
  <!-- Post 2 -->
  <g class="float" style="animation-delay: 0.3s;">
    <rect x="200" y="190" width="500" height="80" rx="12" fill="#1e293b" stroke="rgba(20, 184, 166, 0.08)" stroke-width="1"/>
    <circle cx="220" cy="207" r="16" fill="#64748b"/>
    <rect x="248" y="197" width="120" height="8" rx="4" fill="#475569"/>
    <rect x="248" y="211" width="220" height="6" rx="3" fill="#64748b" opacity="0.6"/>
    <rect x="208" y="231" width="300" height="6" rx="3" fill="#64748b" opacity="0.4"/>
  </g>
  
  <!-- Post 3 -->
  <g class="float" style="animation-delay: 0.6s;">
    <rect x="200" y="284" width="500" height="100" rx="12" fill="#1e293b" stroke="rgba(20, 184, 166, 0.08)" stroke-width="1"/>
    <circle cx="220" cy="304" r="16" fill="url(#accentGrad)"/>
    <rect x="248" y="294" width="80" height="8" rx="4" fill="#475569"/>
    <rect x="248" y="308" width="240" height="6" rx="3" fill="#64748b" opacity="0.6"/>
    <rect x="208" y="328" width="260" height="6" rx="3" fill="#64748b" opacity="0.4"/>
    <rect x="208" y="340" width="200" height="6" rx="3" fill="#64748b" opacity="0.4"/>
  </g>
  
  <!-- Compose area -->
  <rect x="200" y="400" width="500" height="120" rx="12" fill="#1e293b" stroke="rgba(20, 184, 166, 0.08)" stroke-width="1"/>
  <rect x="220" y="420" width="460" height="40" rx="8" fill="#0f172a" stroke="rgba(20, 184, 166, 0.2)" stroke-width="1"/>
  <text x="230" y="448" font-family="Plus Jakarta Sans, sans-serif" font-size="13" fill="#64748b">What's happening...</text>
  <circle cx="710" cy="440" r="12" fill="url(#accentGrad)"/>
</svg>
